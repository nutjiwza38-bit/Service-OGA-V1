<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ประวัติคำขอ — OGA International</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --primary: #1a56db; --primary-dark: #1345b8;
    --surface: #ffffff; --bg: #f0f4f8; --border: #d1d9e0;
    --text: #1a202c; --text-muted: #64748b;
    --danger: #e53e3e; --success: #38a169;
    --radius: 8px;
    --pending-bg: #fffbeb; --pending-txt: #92400e; --pending-border: #fde68a;
    --approved-bg: #f0fff4; --approved-txt: #276749; --approved-border: #9ae6b4;
    --rejected-bg: #fff5f5; --rejected-txt: #9b2c2c; --rejected-border: #feb2b2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun','Segoe UI',sans-serif; background: var(--bg); color: var(--text); }

  .topnav {
    background: #5b21b6; color: #fff;
    padding: 0 20px; height: 54px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .topnav .nav-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .nav-user { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .user-chip { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; }
  .btn-nav { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; }
  .btn-nav:hover { background: rgba(255,255,255,0.25); }

  /* TOOLBAR */
  .toolbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .filter-select {
    padding: 7px 12px; border: 1.5px solid var(--border); border-radius: var(--radius);
    font-size: 13px; font-family: inherit; color: var(--text); outline: none;
    background: var(--surface);
  }
  .filter-select:focus { border-color: var(--primary); }
  .search-input {
    padding: 7px 12px; border: 1.5px solid var(--border); border-radius: var(--radius);
    font-size: 13px; font-family: inherit; outline: none; min-width: 200px; flex: 1;
  }
  .search-input:focus { border-color: var(--primary); }
  .btn-export {
    background: #16a34a; color: #fff; border: none;
    padding: 8px 18px; border-radius: var(--radius);
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 6px; transition: background 0.2s;
    margin-left: auto;
  }
  .btn-export:hover { background: #15803d; }
  .btn-refresh {
    background: none; border: 1.5px solid var(--border);
    padding: 7px 14px; border-radius: var(--radius);
    font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text-muted);
  }
  .btn-refresh:hover { border-color: var(--primary); color: var(--primary); }

  /* CONTENT */
  .content { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }

  /* SUMMARY CHIPS */
  .summary-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
  .summary-chip {
    padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 700;
    border: 1.5px solid; min-width: 110px; text-align: center;
  }
  .chip-total    { background: #f1f5f9; border-color: var(--border); color: var(--text); }
  .chip-pending  { background: var(--pending-bg); border-color: var(--pending-border); color: var(--pending-txt); }
  .chip-approved { background: var(--approved-bg); border-color: var(--approved-border); color: var(--approved-txt); }
  .chip-rejected { background: var(--rejected-bg); border-color: var(--rejected-border); color: var(--rejected-txt); }

  /* TABLE */
  .card { background: var(--surface); border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: #f8fafc; padding: 10px 14px;
    text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; border-bottom: 1.5px solid var(--border); white-space: nowrap;
  }
  td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  .status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .badge-PENDING  { background: var(--pending-bg);  color: var(--pending-txt);  border: 1px solid var(--pending-border); }
  .badge-APPROVED { background: var(--approved-bg); color: var(--approved-txt); border: 1px solid var(--approved-border); }
  .badge-REJECTED { background: var(--rejected-bg); color: var(--rejected-txt); border: 1px solid var(--rejected-border); }

  .btn-detail {
    background: none; border: 1.5px solid var(--primary); color: var(--primary);
    padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: inherit; font-weight: 600;
  }
  .btn-delete {
    background: none; border: 1.5px solid var(--border); color: var(--text-muted);
    padding: 4px 8px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: inherit; margin-left: 4px;
  }
  .btn-delete:hover { border-color: var(--danger); color: var(--danger); }

  .empty-state { text-align: center; padding: 56px; color: var(--text-muted); font-size: 14px; }
  .table-footer { padding: 10px 16px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px;
    max-width: 580px; width: 100%; max-height: 90vh;
    overflow-y: auto; padding: 28px;
  }
  .modal-title {
    font-size: 16px; font-weight: 700; margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media(max-width:480px) { .detail-grid { grid-template-columns: 1fr; } }
  .detail-item label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 3px; }
  .detail-item span  { font-size: 14px; color: var(--text); }
  .full-col { grid-column: 1 / -1; }
  .sig-img { max-width: 100%; border: 1px solid var(--border); border-radius: var(--radius); margin-top: 6px; }

  .toast { position:fixed; bottom:24px; right:24px; padding:14px 20px; border-radius:10px; font-size:14px; font-weight:600; color:#fff; opacity:0; transform:translateY(20px); transition:all .3s; z-index:999; max-width:320px; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.success { background: var(--success); }
  .toast.error   { background: var(--danger); }
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-title">
    📋 ประวัติ & รายงานทั้งหมด
  </div>
  <div class="nav-user">
    <span class="user-chip" id="user-display">—</span>
    <button class="btn-nav" id="back-btn" onclick="goBack()">← กลับ</button>
    <button class="btn-nav" onclick="doLogout()">ออกจากระบบ</button>
  </div>
</nav>

<div class="toolbar">
  <select class="filter-select" id="filter-status" onchange="applyFilters()">
    <option value="ALL">ทุกสถานะ</option>
    <option value="PENDING">รอการอนุมัติ</option>
    <option value="APPROVED">อนุมัติแล้ว</option>
    <option value="REJECTED">ปฏิเสธ</option>
  </select>
  <input type="date" class="filter-select" id="filter-date-from" onchange="applyFilters()" title="วันที่เริ่มต้น"/>
  <input type="date" class="filter-select" id="filter-date-to"   onchange="applyFilters()" title="วันที่สิ้นสุด"/>
  <input type="search" class="search-input" id="filter-search" placeholder="ค้นหา ชื่อ / ทะเบียน / ปลายทาง..." oninput="applyFilters()"/>
  <button class="btn-refresh" onclick="loadAll()">🔄</button>
  <button class="btn-export" onclick="exportExcel()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export Excel
  </button>
</div>

<div class="content">
  <div class="summary-row" id="summary-row"></div>
  <div class="card">
    <div class="table-wrap">
      <table id="data-table">
        <thead>
          <tr>
            <th>เลขที่</th><th>วันที่ขอ</th><th>ผู้ขอ</th><th>แผนก</th>
            <th>บริษัท</th><th>ทะเบียนรถ</th><th>ปลายทาง</th>
            <th>วันที่ออก</th><th>สถานะ</th><th>อนุมัติโดย</th><th></th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="11" class="empty-state">กำลังโหลด...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="table-footer" id="table-footer"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-pid">รายละเอียด</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var API_URL = "https://script.google.com/macros/s/AKfycbyjLmjvjhI9WI41DDNE1Qp3jQuq8vTMjUnSPeqhKd6vDhuknnURNOgyxA2KApdO5Mn4kQ/exec"; // <-- ใส่ URL ของ Web App

  var session = null;
  var allPermits = [];
  var filteredPermits = [];

  window.onload = function() {
    session = getSession();
    if (!session) { window.location.href = "login.html"; return; }
    document.getElementById("user-display").textContent = session.fullName;
    loadAll();
  };

  function goBack() {
    window.location.href = session && session.role === "approver" ? "approve.html" : "permit-form.html";
  }

  // ===== LOAD =====
  function loadAll() {
    document.getElementById("table-body").innerHTML = '<tr><td colspan="11" class="empty-state">กำลังโหลด...</td></tr>';
    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "getPermits", role: session.role, username: session.username, status: "ALL" })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allPermits = data.permits || [];
      applyFilters();
    })
    .catch(function() {
      document.getElementById("table-body").innerHTML = '<tr><td colspan="11" class="empty-state">โหลดข้อมูลไม่สำเร็จ</td></tr>';
    });
  }

  // ===== FILTERS =====
  function applyFilters() {
    var status  = document.getElementById("filter-status").value;
    var search  = document.getElementById("filter-search").value.toLowerCase();
    var dateFrom = document.getElementById("filter-date-from").value;
    var dateTo   = document.getElementById("filter-date-to").value;

    filteredPermits = allPermits.filter(function(p) {
      if (status !== "ALL" && p.Status !== status) return false;
      if (search && ![p.RequesterName, p.LicensePlate, p.Destination, p.PermitID, p.Department]
          .join(" ").toLowerCase().includes(search)) return false;
      // date filter (format dd/MM/yyyy -> compare as string after reformat)
      if (dateFrom || dateTo) {
        var parts = (p.RequestDate || "").split("/");
        if (parts.length === 3) {
          var iso = parts[2] + "-" + parts[1] + "-" + parts[0];
          if (dateFrom && iso < dateFrom) return false;
          if (dateTo   && iso > dateTo)   return false;
        }
      }
      return true;
    });

    renderTable();
    renderSummary();
  }

  function renderTable() {
    if (!filteredPermits.length) {
      document.getElementById("table-body").innerHTML = '<tr><td colspan="11" class="empty-state">ไม่พบข้อมูล</td></tr>';
      document.getElementById("table-footer").textContent = "";
      return;
    }
    var isApprover = session && session.role === "approver";
    var rows = filteredPermits.map(function(p) {
      var delBtn = isApprover
        ? '<button class="btn-delete" onclick="event.stopPropagation();confirmDelete(\'' + esc(p.PermitID) + '\')">🗑</button>'
        : "";
      return '<tr>' +
        '<td>' + esc(p.PermitID) + '</td>' +
        '<td>' + esc(p.RequestDate) + '</td>' +
        '<td>' + esc(p.RequesterName) + '</td>' +
        '<td>' + esc(p.Department) + '</td>' +
        '<td>' + esc(p.Company) + '</td>' +
        '<td>' + esc(p.LicensePlate) + '</td>' +
        '<td>' + esc(p.Destination) + '</td>' +
        '<td>' + esc(p.DepartureDate) + '</td>' +
        '<td><span class="status-badge badge-' + p.Status + '">' + statusLabel(p.Status) + '</span></td>' +
        '<td>' + esc(p.ApprovedBy || "—") + '</td>' +
        '<td style="white-space:nowrap">' +
          '<button class="btn-detail" onclick="showDetail(' + JSON.stringify(p).replace(/"/g,'&quot;') + ')">ดู</button>' +
          delBtn +
        '</td>' +
      '</tr>';
    }).join("");
    document.getElementById("table-body").innerHTML = rows;
    document.getElementById("table-footer").textContent = "แสดง " + filteredPermits.length + " รายการ จากทั้งหมด " + allPermits.length + " รายการ";
  }

  function renderSummary() {
    var total    = allPermits.length;
    var pending  = allPermits.filter(function(p){ return p.Status==="PENDING";  }).length;
    var approved = allPermits.filter(function(p){ return p.Status==="APPROVED"; }).length;
    var rejected = allPermits.filter(function(p){ return p.Status==="REJECTED"; }).length;
    document.getElementById("summary-row").innerHTML =
      '<div class="summary-chip chip-total">ทั้งหมด<br>' + total + ' รายการ</div>' +
      '<div class="summary-chip chip-pending">รอการอนุมัติ<br>' + pending + ' รายการ</div>' +
      '<div class="summary-chip chip-approved">อนุมัติแล้ว<br>' + approved + ' รายการ</div>' +
      '<div class="summary-chip chip-rejected">ปฏิเสธ<br>' + rejected + ' รายการ</div>';
  }

  // ===== DETAIL MODAL =====
  function showDetail(p) {
    document.getElementById("modal-pid").textContent = "คำขอ: " + p.PermitID;
    var sigHtml = p.SignatureBase64
      ? '<div class="detail-item full-col"><label>ลายเซ็นต์ผู้อนุมัติ</label><img class="sig-img" src="' + p.SignatureBase64 + '" alt="sig"/></div>'
      : "";
    var rejectHtml = p.Status === "REJECTED" && p.RejectReason
      ? '<div class="detail-item full-col"><label>เหตุผลที่ปฏิเสธ</label><span style="color:var(--danger)">' + esc(p.RejectReason) + '</span></div>'
      : "";

    document.getElementById("modal-body").innerHTML =
      '<div class="detail-grid">' +
        dRow("เลขที่",            p.PermitID) +
        dRow("วันที่ขอ",          p.RequestDate + " " + p.RequestTime) +
        dRow("ชื่อผู้ขอ",         p.RequesterName) +
        dRow("แผนก",              p.Department) +
        dRow("บริษัท",            p.Company) +
        dRow("ประเภทรถ",          p.VehicleType) +
        dRow("ทะเบียนรถ",         p.LicensePlate) +
        dRow("ชื่อผู้ขับ",        p.DriverName) +
        '<div class="detail-item full-col"><label>ปลายทาง</label><span>' + esc(p.Destination) + '</span></div>' +
        '<div class="detail-item full-col"><label>วัตถุประสงค์</label><span>' + esc(p.Purpose) + '</span></div>' +
        dRow("วันที่-เวลาออก",    p.DepartureDate + " " + p.DepartureTime) +
        dRow("วันที่-เวลากลับ",   (p.ReturnDate||"—") + " " + (p.ReturnTime||"")) +
        dRow("สถานะ",             '<span class="status-badge badge-' + p.Status + '">' + statusLabel(p.Status) + '</span>') +
        dRow("อนุมัติโดย",        p.ApprovedBy || "—") +
        dRow("วันที่อนุมัติ",     p.ApproveDate ? p.ApproveDate + " " + p.ApproveTime : "—") +
        sigHtml + rejectHtml +
      '</div>';
    document.getElementById("detail-modal").classList.add("open");
  }

  function closeModal() { document.getElementById("detail-modal").classList.remove("open"); }

  // ===== DELETE =====
  function confirmDelete(permitId) {
    if (!confirm("ยืนยันลบคำขอ " + permitId + " ?")) return;
    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "deletePermit", permitId: permitId })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === "ok") {
        showToast("ลบเรียบร้อยแล้ว", "success");
        loadAll();
      } else {
        showToast("❌ " + (data.message || "เกิดข้อผิดพลาด"), "error");
      }
    })
    .catch(function() { showToast("❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้", "error"); });
  }

  // ===== EXPORT EXCEL (SheetJS) =====
  function exportExcel() {
    if (!filteredPermits.length) {
      showToast("ไม่มีข้อมูลที่จะ export", "error");
      return;
    }
    var rows = filteredPermits.map(function(p) {
      return {
        "เลขที่ใบอนุญาต":    p.PermitID,
        "วันที่ขอ":          p.RequestDate,
        "เวลาขอ":            p.RequestTime,
        "ชื่อผู้ขอ":         p.RequesterName,
        "แผนก":              p.Department,
        "บริษัท":            p.Company,
        "ประเภทรถ":          p.VehicleType,
        "ทะเบียนรถ":         p.LicensePlate,
        "ชื่อผู้ขับ":        p.DriverName,
        "ปลายทาง":           p.Destination,
        "วัตถุประสงค์":      p.Purpose,
        "วันที่ออก":         p.DepartureDate,
        "เวลาออก":           p.DepartureTime,
        "วันที่กลับ":        p.ReturnDate,
        "เวลากลับ":          p.ReturnTime,
        "ผู้ร่วมเดินทาง":    p.PassengerList,
        "หมายเหตุ":          p.Remarks,
        "สถานะ":             statusLabel(p.Status),
        "อนุมัติโดย":        p.ApprovedBy,
        "วันที่อนุมัติ":     p.ApproveDate,
        "เวลาอนุมัติ":       p.ApproveTime,
        "เหตุผลที่ปฏิเสธ":   p.RejectReason,
        "ผู้สร้างรายการ":    p.CreatedBy
      };
    });

    var ws   = XLSX.utils.json_to_sheet(rows);
    var wb   = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "VehiclePermits");

    // ปรับความกว้างคอลัมน์
    var colWidths = Object.keys(rows[0]).map(function(k) {
      var maxLen = Math.max(k.length, rows.reduce(function(m, r) {
        return Math.max(m, String(r[k] || "").length);
      }, 0));
      return { wch: Math.min(maxLen + 2, 40) };
    });
    ws["!cols"] = colWidths;

    var now = new Date();
    var fname = "VehiclePermits_" +
      now.getFullYear() + ("0"+(now.getMonth()+1)).slice(-2) + ("0"+now.getDate()).slice(-2) + ".xlsx";
    XLSX.writeFile(wb, fname);
    showToast("✅ Export สำเร็จ — " + filteredPermits.length + " รายการ", "success");
  }

  // ===== HELPERS =====
  function dRow(label, value) {
    return '<div class="detail-item"><label>' + label + '</label><span>' + (value || "—") + '</span></div>';
  }
  function statusLabel(s) { return s==="PENDING"?"รอการอนุมัติ":s==="APPROVED"?"อนุมัติแล้ว":s==="REJECTED"?"ปฏิเสธ":s; }
  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function showToast(msg, type) {
    var t = document.getElementById("toast");
    t.textContent = msg; t.className = "toast " + type + " show";
    setTimeout(function() { t.className = "toast"; }, 3500);
  }
  function getSession() { try { return JSON.parse(sessionStorage.getItem("oga_session")); } catch(e) { return null; } }
  function doLogout() { sessionStorage.removeItem("oga_session"); window.location.href = "login.html"; }

  document.getElementById("detail-modal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
